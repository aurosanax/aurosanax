<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <title>Aurosanax - Centro Médico</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #333;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }
    header img {
      width: 120px;
      margin-bottom: 10px;
    }
    header p {
      font-size: 1.1rem;
      color: #b30059;
      margin: 0;
    }
    nav {
      background-color: #b30059;
      text-align: center;
      padding: 10px 0;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main {
      max-width: 900px;
      margin: auto;
      padding: 2rem;
    }
    section {
      margin-bottom: 2rem;
    }
    h2 {
      border-bottom: 2px solid #b30059;
      padding-bottom: 5px;
      color: #b30059;
    }
    h3 {
      color: #b30059;
    }
    ul {
      list-style: disc;
      padding-left: 20px;
    }
    .button {
      display: inline-block;
      background-color: #b30059;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      margin-top: 1rem;
    }
    .button:hover {
      background-color: #99004d;
    }
    footer {
      background-color: #f4f4f4;
      text-align: center;
      font-size: 0.9rem;
      padding: 2rem 1rem;
      margin-top: 3rem;
      color: #555;
    }
    footer h4 {
      margin-top: 2rem;
      color: #b30059;
    }
  </style>
</head>
